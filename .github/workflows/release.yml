name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ferris-db

permissions:
  contents: write
  packages: write

jobs:
  # Build binaries for each platform
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            archive_cmd: tar -czvf
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            archive_cmd: tar -czvf
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            archive_cmd: tar -czvf
            cross: true

          # macOS builds
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            archive_cmd: tar -czvf
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            archive_cmd: tar -czvf

          # Windows builds
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --package ferris-server --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE_NAME="${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          
          # Copy binary
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "${ARCHIVE_NAME}/"
          chmod +x "${ARCHIVE_NAME}/${{ env.BINARY_NAME }}"
          
          # Copy documentation
          cp README.md "${ARCHIVE_NAME}/" 2>/dev/null || true
          cp LICENSE* "${ARCHIVE_NAME}/" 2>/dev/null || true
          cp CHANGELOG.md "${ARCHIVE_NAME}/" 2>/dev/null || true
          
          # Create archive
          tar -czvf "${ARCHIVE_NAME}.${{ matrix.archive }}" "${ARCHIVE_NAME}"
          
          # Calculate checksum
          shasum -a 256 "${ARCHIVE_NAME}.${{ matrix.archive }}" > "${ARCHIVE_NAME}.${{ matrix.archive }}.sha256"
          
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $ARCHIVE_NAME = "${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $ARCHIVE_NAME
          
          # Copy binary
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" -Destination "${ARCHIVE_NAME}/"
          
          # Copy documentation
          if (Test-Path "README.md") { Copy-Item "README.md" -Destination "${ARCHIVE_NAME}/" }
          Get-ChildItem -Path "." -Filter "LICENSE*" | Copy-Item -Destination "${ARCHIVE_NAME}/"
          if (Test-Path "CHANGELOG.md") { Copy-Item "CHANGELOG.md" -Destination "${ARCHIVE_NAME}/" }
          
          # Create archive
          Compress-Archive -Path "${ARCHIVE_NAME}/*" -DestinationPath "${ARCHIVE_NAME}.${{ matrix.archive }}"
          
          # Calculate checksum
          $hash = (Get-FileHash "${ARCHIVE_NAME}.${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "${hash}  ${ARCHIVE_NAME}.${{ matrix.archive }}" | Out-File -FilePath "${ARCHIVE_NAME}.${{ matrix.archive }}.sha256" -Encoding utf8 -NoNewline
          
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $env:GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_NAME }}.${{ matrix.archive }}
            ${{ env.ARCHIVE_NAME }}.${{ matrix.archive }}.sha256
          retention-days: 1

  # Create release and upload all assets
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ferris-db ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*
          body: |
            ## ferris-db ${{ steps.version.outputs.version }}
            
            A high-performance, multi-threaded, Redis-compatible distributed key-value store written in Rust.
            
            ### Downloads
            
            | Platform | Architecture | File |
            |----------|--------------|------|
            | Linux | x86_64 (glibc) | `ferris-db-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux | x86_64 (musl/static) | `ferris-db-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz` |
            | Linux | ARM64 | `ferris-db-${{ steps.version.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS | Intel (x86_64) | `ferris-db-${{ steps.version.outputs.version }}-x86_64-apple-darwin.tar.gz` |
            | macOS | Apple Silicon (ARM64) | `ferris-db-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz` |
            | Windows | x86_64 | `ferris-db-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip` |
            
            ### Installation
            
            ```bash
            # Linux/macOS
            tar -xzf ferris-db-${{ steps.version.outputs.version }}-<platform>.tar.gz
            cd ferris-db-${{ steps.version.outputs.version }}-<platform>
            ./ferris-db
            
            # Windows (PowerShell)
            Expand-Archive ferris-db-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip
            cd ferris-db-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc
            .\ferris-db.exe
            ```
            
            ### Verify Downloads
            
            Each archive has a corresponding `.sha256` checksum file:
            
            ```bash
            # Linux/macOS
            shasum -a 256 -c ferris-db-${{ steps.version.outputs.version }}-<platform>.tar.gz.sha256
            
            # Windows (PowerShell)
            (Get-FileHash ferris-db-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip -Algorithm SHA256).Hash
            ```
            
            ### Quick Start
            
            ```bash
            # Start the server (default port: 6380)
            ./ferris-db
            
            # Connect with redis-cli
            redis-cli -p 6380
            
            # Or use any Redis client library
            ```
            
            ### Features
            
            - ✅ Full Redis protocol compatibility (RESP2/RESP3)
            - ✅ Multi-threaded with key-level locking
            - ✅ 214+ Redis commands implemented
            - ✅ Cross-platform (Linux, macOS, Windows)
            - ✅ No dependencies - single binary
            
            See the [README](https://github.com/${{ github.repository }}) for full documentation.

  # Build and push Docker image
  docker:
    name: Docker Image
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(steps.version.outputs.version, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
