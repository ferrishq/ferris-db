name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ferris-db

jobs:
  # First, run all CI checks to ensure quality
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # Create the release (runs after CI passes)
  create-release:
    name: Create Release
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: ferris-db ${{ steps.get_version.outputs.version }}
          body: |
            ## ferris-db ${{ steps.get_version.outputs.version }}
            
            A high-performance, multi-threaded, Redis-compatible distributed key-value store written in Rust.
            
            ### Installation
            
            Download the appropriate binary for your platform below, extract it, and add it to your PATH.
            
            ```bash
            # Linux (x86_64)
            tar -xzf ferris-db-${{ steps.get_version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
            
            # macOS (Intel)
            tar -xzf ferris-db-${{ steps.get_version.outputs.version }}-x86_64-apple-darwin.tar.gz
            
            # macOS (Apple Silicon)
            tar -xzf ferris-db-${{ steps.get_version.outputs.version }}-aarch64-apple-darwin.tar.gz
            
            # Windows
            # Extract the zip file and add to PATH
            ```
            
            ### Quick Start
            
            ```bash
            # Start the server (default port: 6380)
            ./ferris-db
            
            # Connect with redis-cli
            redis-cli -p 6380
            ```
            
            ### Features
            
            - Full Redis protocol compatibility (RESP2/RESP3)
            - Multi-threaded with key-level locking
            - 214+ Redis commands implemented
            - Cross-platform (Linux, macOS, Windows)
            
            See the [README](https://github.com/${{ github.repository }}) for full documentation.
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}

  # Build binaries for each platform
  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true

          # macOS builds
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # Windows builds
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: |
          cargo build --release --package ferris-server --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          ARCHIVE_NAME="${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          
          # Copy binary
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "${ARCHIVE_NAME}/"
          
          # Copy documentation
          cp README.md "${ARCHIVE_NAME}/" 2>/dev/null || true
          cp LICENSE* "${ARCHIVE_NAME}/" 2>/dev/null || true
          cp CHANGELOG.md "${ARCHIVE_NAME}/" 2>/dev/null || true
          
          # Create archive
          tar -czvf "${ARCHIVE_NAME}.${{ matrix.archive }}" "${ARCHIVE_NAME}"
          
          # Calculate checksum
          shasum -a 256 "${ARCHIVE_NAME}.${{ matrix.archive }}" > "${ARCHIVE_NAME}.${{ matrix.archive }}.sha256"
          
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          $ARCHIVE_NAME = "${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $ARCHIVE_NAME
          
          # Copy binary
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" -Destination "${ARCHIVE_NAME}/"
          
          # Copy documentation
          Copy-Item README.md -Destination "${ARCHIVE_NAME}/" -ErrorAction SilentlyContinue
          Copy-Item LICENSE* -Destination "${ARCHIVE_NAME}/" -ErrorAction SilentlyContinue
          Copy-Item CHANGELOG.md -Destination "${ARCHIVE_NAME}/" -ErrorAction SilentlyContinue
          
          # Create archive
          Compress-Archive -Path "${ARCHIVE_NAME}/*" -DestinationPath "${ARCHIVE_NAME}.${{ matrix.archive }}"
          
          # Calculate checksum
          $hash = (Get-FileHash "${ARCHIVE_NAME}.${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "${hash}  ${ARCHIVE_NAME}.${{ matrix.archive }}" | Out-File -FilePath "${ARCHIVE_NAME}.${{ matrix.archive }}.sha256" -Encoding utf8
          
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $env:GITHUB_ENV

      - name: Upload archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.ARCHIVE_NAME }}.${{ matrix.archive }}
          asset_name: ${{ env.ARCHIVE_NAME }}.${{ matrix.archive }}
          asset_content_type: ${{ matrix.archive == 'zip' && 'application/zip' || 'application/gzip' }}

      - name: Upload checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.ARCHIVE_NAME }}.${{ matrix.archive }}.sha256
          asset_name: ${{ env.ARCHIVE_NAME }}.${{ matrix.archive }}.sha256
          asset_content_type: text/plain

  # Publish to crates.io (optional, only for stable releases)
  publish-crates:
    name: Publish to crates.io
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.create-release.outputs.version, '-') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        run: |
          echo "Crates.io publishing would happen here"
          echo "To enable, add CARGO_REGISTRY_TOKEN secret and uncomment publish commands"
          # Publish in dependency order:
          # cargo publish --package ferris-protocol --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          # cargo publish --package ferris-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          # cargo publish --package ferris-commands --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          # cargo publish --package ferris-persistence --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          # cargo publish --package ferris-network --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          # cargo publish --package ferris-server --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Build and push Docker image
  docker:
    name: Docker Image
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(needs.create-release.outputs.version, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
